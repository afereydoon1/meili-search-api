services:
  laravel-app:
    build:
      context: ../
      dockerfile: deploy/docker/app/Dockerfile
      args:
        - APP_ENV=${APP_ENV:-local}
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    image: ${COMPOSE_PROJECT_NAME}/laravel-app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-laravel-app
    restart: unless-stopped
    volumes:
      - ../:/var/www:cached
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network
    env_file:
      - ../.env

  nginx:
    build:
      context: ../
      dockerfile: deploy/docker/nginx/Dockerfile
      args:
        - APP_ENV=${APP_ENV:-local}
    image: ${COMPOSE_PROJECT_NAME}/nginx:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PUBLISHED_PORT:-80}:${NGINX_PORT:-80}"
    volumes:
      - ../:/var/www
      - ./docker/nginx/templates:/etc/nginx/templates
    env_file:
      - ../.env
    depends_on:
      - laravel-app
    networks:
      - network

  postgres:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME}-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PUBLISHED_PORT:-8080}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - network

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - network


volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME}-postgres-data
  pgadmin-data:
    name: ${COMPOSE_PROJECT_NAME}-pgadmin
  redis-data:
    name: ${COMPOSE_PROJECT_NAME}-redis-data


networks:
  network:
    name: ${COMPOSE_PROJECT_NAME}-network
    driver: bridge
